<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="login.css" />
  </head>
  <body bgcolor="#EAE6DD">
    <main id="caixa">
      <form action="">
          <div>
            <h1>Login</h1>
          </div>
          <div class="campo_input">
            <span style="text-align:start ">Email</span>
                <br>
            <input type="email" placeholder="Informe seu email" required/>
          </div>
          <div class="campo_input">
            <span style="text-align:start ;">Senha</span>
                <br>
            <input type="password" placeholder="Senha" required/>
          </div>
          <div class="campo_input"><input type="submit" value="login" / id="botao_login"></div>
          <img src="logo.png" alt="logo" width="100%" />
      </form>
    </main>
  </body>
</html>
